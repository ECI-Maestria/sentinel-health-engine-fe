name: "Sentinel Health Engine — Frontend CI/CD"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_SERVER: crsentinelhe.azurecr.io
  ACR_NAME: crsentinelhe
  RESOURCE_GROUP: rg-sentinel-health-engine
  CONTAINER_APP: sentinel-fe

# ─────────────────────────────────────────────────────────────
# Stage 1 — 🏗️ BUILD
# TypeScript check + Vite production build
# ─────────────────────────────────────────────────────────────
jobs:
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# Stage 2 — 🧪 TEST
# Unit tests with coverage report. Requires Stage 1.
# ─────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# Stage 3 — 🔍 SONAR ANALYSIS
# Static analysis and coverage report. Requires Stage 2.
# ─────────────────────────────────────────────────────────────
  sonar:
    name: "🔍 SonarCloud Analysis"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ─────────────────────────────────────────────────────────────
# Stage 4 — 🚀 DEPLOY
# Build Docker image, push to ACR, update Container App.
# Runs only on push to main. Requires Stage 3.
# ─────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: sonar
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push image
        run: |
          IMAGE="${{ env.ACR_SERVER }}/${{ env.CONTAINER_APP }}"
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            --build-arg VITE_ANALYTICS_URL="${{ secrets.VITE_ANALYTICS_URL }}" \
            --build-arg VITE_CALENDAR_URL="${{ secrets.VITE_CALENDAR_URL }}" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/${{ env.CONTAINER_APP }}:${{ github.sha }}"

      - name: Verify deployment
        run: |
          az containerapp revision list \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[0].{revision:name, state:properties.runningState, image:properties.template.containers[0].image}" \
            --output table
