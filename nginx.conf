# =============================================================================
# nginx.conf — sentinel-health-engine-fe
# Configuración de Nginx para servir la SPA de React + Vite.
#
# Design decisions:
#   - SPA routing: todas las rutas no encontradas devuelven index.html para
#     que react-router-dom maneje la navegación del lado del cliente.
#   - Cache agresivo para assets: Vite genera hashes en los nombres de archivo
#     (ej: main.a1b2c3d4.js), lo que hace seguro el cache inmutable de 1 año.
#   - No-cache para index.html: garantiza que los usuarios siempre reciban la
#     versión más reciente del punto de entrada.
#   - Health check en /health: requerido por Azure Container Apps para las
#     liveness probes. Retorna JSON para compatibilidad con monitoreo.
#   - Gzip: reduce el tamaño de transferencia de JS/CSS típicamente un 60-70%.
#   - Security headers: protección básica contra clickjacking, MIME sniffing
#     y referrer leakage.
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Compresión Gzip
    # Mejora el tiempo de carga reduciendo el tamaño de los assets JS y CSS.
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/manifest+json
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # SPA routing: todas las rutas sirven index.html
    # React Router DOM maneja la navegación del lado del cliente.
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Cache agresivo para assets estáticos
    # Vite genera hashes en el nombre de los archivos (content-addressed),
    # por lo que es seguro usar cache inmutable de 1 año.
    # Ejemplo: /assets/index.B3a9cK2d.js
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Evitar que los security headers globales se dupliquen en esta location
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -------------------------------------------------------------------------
    # No cache para index.html
    # Garantiza que los usuarios siempre obtengan el HTML más reciente,
    # que a su vez referencia los assets con sus hashes actualizados.
    # -------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # -------------------------------------------------------------------------
    # Health check endpoint para Azure Container Apps
    # Azure verifica este endpoint para liveness y readiness probes.
    # access_log off evita ruido en los logs de producción.
    # -------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"web-service"}';
        add_header Content-Type application/json;
    }
}
